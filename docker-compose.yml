name: techhub

services:
  db:
    image: postgres:16-alpine
    environment:
      # For local development sensible defaults are provided, but in
      # production you MUST override these values with secure credentials
      POSTGRES_USER: ${POSTGRES_USER:-techhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techhub}
      POSTGRES_DB: ${POSTGRES_DB:-techhub}
    ports:
      # Bind the container Postgres port to the host. The host IP remains
      # localhost for safety; the host port is configurable via
      # POSTGRES_PORT in the environment (see .env.example).
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techhub-app
    restart: unless-stopped
    ports:
      - "${PORT:-80}:3000"
    env_file:
      - .env
    environment:
      # --- Docker-internal overrides ---
      # The .env file points REDIS_URL and DATABASE_URL at localhost for
      # "npm run dev" outside Docker.  Inside Docker the app must reach
      # the companion containers via their service names, so we hard-set
      # them here.  The environment: block takes priority over env_file,
      # so every OTHER variable in .env (NEXTAUTH_URL, NEXTAUTH_SECRET,
      # ADMIN_EMAIL, SSO_MASTER_KEY …) still flows through unchanged.
      #
      # In production (Azure Container App) docker-compose is not used —
      # Azure injects REDIS_URL, DATABASE_URL, etc. directly and the
      # container reads them from process.env at runtime.
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-techhub}:${POSTGRES_PASSWORD:-techhub}@db:5432/${POSTGRES_DB:-techhub}?schema=public
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "node -e 'fetch(\"http://localhost:3000/api/health\").then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]

volumes:
  pgdata:
  uploads:
