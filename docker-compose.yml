name: techhub

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techhub
      POSTGRES_PASSWORD: techhub
      POSTGRES_DB: techhub
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - RATE_LIMIT_STORE=${RATE_LIMIT_STORE:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_TLS=${REDIS_TLS:-false}
    depends_on:
      - db
      - redis
    command: >
      sh -c "npm run prisma:push && npm run prisma:seed && npm run start"
    volumes:
      - uploads:/app/uploads

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

volumes:
  pgdata:
  uploads:
