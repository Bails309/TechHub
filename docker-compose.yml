name: techhub

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techhub
      POSTGRES_PASSWORD: techhub
      POSTGRES_DB: techhub
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    # Do not publish the app port to the host. The app is proxied via the
    # `proxy` service (nginx) and should not be directly reachable on the
    # host to avoid bypassing the reverse proxy.
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - RATE_LIMIT_STORE=${RATE_LIMIT_STORE:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_TLS=${REDIS_TLS:-false}
    depends_on:
      - db
      - redis
    command: >
      sh -c "npm run prisma:push && npm run prisma:seed && npm run start"
    volumes:
      - ./uploads:/app/uploads

  proxy:
    build: ./nginx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:rw
      - ./nginx/init-cert.sh:/usr/local/bin/init-cert.sh:ro
      - ./nginx/proxy-healthcheck.sh:/usr/local/bin/proxy-healthcheck.sh:ro
      - nginx_logs:/var/log/nginx
    command: ["/bin/sh", "-c", "apk add --no-cache openssl && /usr/local/bin/init-cert.sh && exec nginx -g 'daemon off;'" ]
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/proxy-healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

volumes:
  pgdata:
  nginx_logs:
