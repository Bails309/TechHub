name: CI Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techhub
          POSTGRES_PASSWORD: techhub
          POSTGRES_DB: techhub
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U techhub -d techhub" --health-interval=5s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in $(seq 1 20); do
            pg_isready -h 127.0.0.1 -p 5432 -U techhub && break || sleep 1
          done

      - name: Prepare database
        run: npm run prisma:push && npm run prisma:seed

      - name: Run tests
        run: npm test
