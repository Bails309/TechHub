name: CI

permissions:
  contents: read
  packages: read

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: techhub
          POSTGRES_PASSWORD: techhub
          POSTGRES_DB: techhub
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U techhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U techhub && break || sleep 1
          done

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgres://techhub:techhub@localhost:5432/techhub" >> $GITHUB_ENV
      - name: Set REDIS_URL and rate limiter
        run: |
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "RATE_LIMIT_STORE=redis" >> $GITHUB_ENV

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma push (ensure DB schema)
        run: npm run prisma:push

      - name: Prisma seed
        run: npm run prisma:seed
        env:
          SSO_MASTER_KEY: Xq6GDOrUKS+Tr2w/l70bbfy6Rg6LCQE53ddlkSv9G6E=
          ADMIN_PASSWORD: test-admin-password-123
          ADMIN_MUST_CHANGE: false

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests (builder image)
        run: |
          # Build the Dockerfile 'builder' stage and run the test suite inside
          # the resulting image. Use host networking so the container can reach
          # the service containers started by the job (Postgres/Redis) via
          # localhost:5432 and localhost:6379.
          docker build --target builder -t techhub-tests .
          docker run --rm --network host \
            -e DATABASE_URL="postgres://techhub:techhub@localhost:5432/techhub" \
            -e REDIS_URL="redis://localhost:6379" \
            -e RATE_LIMIT_STORE=redis \
            -e SSO_MASTER_KEY=Xq6GDOrUKS+Tr2w/l70bbfy6Rg6LCQE53ddlkSv9G6E= \
            techhub-tests sh -lc "CI=true npm test -- --run"

      - name: Build Next.js
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (CI)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: techhub:ci
      - name: Start Postgres container for smoke test
        run: |
          docker run -d --name ci-postgres -e POSTGRES_USER=techhub -e POSTGRES_PASSWORD=techhub -e POSTGRES_DB=techhub -p 5432:5432 postgres:16
          for i in {1..30}; do
            docker exec ci-postgres pg_isready -U techhub && break || sleep 1
          done
      - name: Start Redis container for smoke test
        run: |
          docker run -d --name ci-redis -p 6379:6379 redis:7
          for i in {1..30}; do
            docker exec ci-redis redis-cli ping >/dev/null 2>&1 && break || sleep 1
          done
      - name: Run container from built image and smoke-check health endpoint
        run: |
          docker run -d --name techhub-ci --link ci-postgres:postgres --link ci-redis:redis \
            -e DATABASE_URL=postgres://techhub:techhub@postgres:5432/techhub \
            -e REDIS_URL=redis://redis:6379 \
            -e RATE_LIMIT_STORE=redis \
            -e SSO_MASTER_KEY=Xq6GDOrUKS+Tr2w/l70bbfy6Rg6LCQE53ddlkSv9G6E= \
            -p 3000:3000 techhub:ci
          for i in {1..60}; do
            if curl -sSf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "health ok"; break
            fi
            sleep 1
          done
      - name: Tear down containers
        if: always()
        run: |
          docker rm -f techhub-ci || true
          docker rm -f ci-postgres || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DATABASE_URL: postgres://techhub:techhub@localhost:5432/techhub
      REDIS_URL: redis://localhost:6379
      SSO_MASTER_KEY: Xq6GDOrUKS+Tr2w/l70bbfy6Rg6LCQE53ddlkSv9G6E=
      NEXTAUTH_SECRET: placeholder-secret-for-ci-testing-purpose-only
      NEXTAUTH_URL: http://localhost:3000
      ADMIN_PASSWORD: test-admin-password-123
      ADMIN_MUST_CHANGE: "false"
      ALLOW_MISSING_REMOTE_IP: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start Postgres for E2E
        run: |
          docker run -d --name e2e-postgres -e POSTGRES_USER=techhub -e POSTGRES_PASSWORD=techhub -e POSTGRES_DB=techhub -p 5432:5432 postgres:16
          for i in {1..30}; do
            docker exec e2e-postgres pg_isready -U techhub && break || sleep 1
          done

      - name: Start Redis for E2E
        run: |
          docker run -d --name e2e-redis -p 6379:6379 redis:7
          for i in {1..30}; do
            docker exec e2e-redis redis-cli ping >/dev/null 2>&1 && break || sleep 1
          done

      - name: Prepare Database and Seed
        run: |
          npm run prisma:push
          npm run prisma:seed

      - name: Build and Run app for E2E
        run: |
          npm run build
          npm run start &
          # Wait for app to be ready
          for i in {1..60}; do
            if curl -s http://localhost:3000 >/dev/null; then echo "App ready"; break; fi
            sleep 1
          done

      - name: Run Playwright tests
        run: |
          export PLAYWRIGHT_BASE_URL=http://localhost:3000
          npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30