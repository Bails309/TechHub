name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: techhub
          POSTGRES_PASSWORD: techhub
          POSTGRES_DB: techhub
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U techhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U techhub && break || sleep 1
          done

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgres://techhub:techhub@localhost:5432/techhub" >> $GITHUB_ENV

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma push (ensure DB schema)
        run: npm run prisma:push

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --run

      - name: Build Next.js
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: techhub
          POSTGRES_PASSWORD: techhub
          POSTGRES_DB: techhub
        options: >-
          --health-cmd "pg_isready -U techhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (CI)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: techhub:ci
      - name: Run container from built image and smoke-check health endpoint
        run: |
          docker run -d --name techhub-ci --link postgres:postgres -e DATABASE_URL=postgres://techhub:techhub@postgres:5432/techhub techhub:ci
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "health ok"; break
            fi
            sleep 1
          done
      - name: Tear down container
        if: always()
        run: docker rm -f techhub-ci || true